@if (user) {
<div class="profile">
  <h1>{{ user.username }}</h1>
  <p>Select your main Smash character:</p>

  <div class="main-selection-wrapper">
    <app-character-select
      [characters]="characters"
      (selected)="selectMain($event)"
    ></app-character-select>

    @if (selectedMain) {
    <div class="character-preview">
      <img
        class="character-icon"
        [src]="selectedMain.icon"
        [alt]="selectedMain.name"
      />
      <span class="char-name">{{ selectedMain.name }}</span>
    </div>
    }
  </div>

  <button
    class="save-btn"
    [disabled]="!selectedMain || saving"
    (click)="saveMain()"
  >
    {{ saving ? "Saving..." : "Save" }}
  </button>

  @if (message) {
  <p class="message">{{ message }}</p>
  }
</div>
} @else {
<div class="login-prompt">
  <p>You must log in with Discord to set your main.</p>
  <button (click)="loginWithDiscord()">Login with Discord</button>
</div>
}
