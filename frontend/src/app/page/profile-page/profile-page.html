@if (user) {
  <div class="profile-container">
    <p-card>
      <ng-template #header>
        <div class="profile-header">
          <p-avatar [image]="avatarUrl" shape="circle" size="xlarge" class="profile-avatar" />
          <div class="profile-info">
            <h1>{{ user.username }}</h1>
            @if (user.main) {
              <span class="current-main">Current main: {{ user.main }}</span>
            }
          </div>
        </div>
      </ng-template>

      <ng-template #content>
        <p class="section-label">Select your main character</p>
        <div class="main-selection">
          <app-character-select
            [characters]="characters"
            (selected)="selectMain($event)"
          />
          @if (selectedMain) {
            <div class="selected-preview">
              <img [src]="selectedMain.icon" [alt]="selectedMain.name" class="char-icon" />
              <span class="char-name">{{ selectedMain.name }}</span>
            </div>
          }
        </div>
      </ng-template>

      <ng-template #footer>
        <p-button
          [label]="saving ? 'Saving...' : 'Save Main'"
          icon="pi pi-save"
          [disabled]="!selectedMain || saving"
          [loading]="saving"
          (onClick)="saveMain()"
          [style]="{ width: '100%' }"
        />
      </ng-template>
    </p-card>
  </div>
} @else {
  <div class="login-container">
    <p-card>
      <ng-template #content>
        <div class="login-content">
          <i class="pi pi-discord login-icon"></i>
          <h2>Sign In Required</h2>
          <p>Log in with Discord to set your main character</p>
          <p-button
            label="Login with Discord"
            icon="pi pi-discord"
            size="large"
            (onClick)="loginWithDiscord()"
          />
        </div>
      </ng-template>
    </p-card>
  </div>
}
