<p-select
  [(ngModel)]="selectedChar"
  [options]="characters"
  optionLabel="name"
  [filter]="true"
  filterBy="name"
  placeholder="Search characters..."
  appendTo="body"
  [resetFilterOnHide]="true"
  (onChange)="onSelect($event)"
  [style]="{ width: '100%' }"
>
  <ng-template #item let-char>
    <div class="char-option">
      <img [src]="char.icon" [alt]="char.name" width="28" height="28" />
      <span>{{ char.name }}</span>
    </div>
  </ng-template>
</p-select>
